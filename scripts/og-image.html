<!doctype html>
<!--
  Editable SOURCE for public/og-image.png (Open Graph / Twitter social preview), issue #42.
  1200×630 (1.91:1) — the universal OG/large-summary card size.

  To regenerate public/og-image.png (no build dependency):
    1. Copy this file into public/ (e.g. public/og-render.html) so the dev/preview server
       serves it and the logo path resolves at the /ChIC/ base.
    2. Open http://localhost:8138/ChIC/og-render.html in headless Chrome at a 1200×630 viewport.
    3. Screenshot the .og element (or the full viewport) to public/og-image.png.
    4. Delete public/og-render.html (this stays in scripts/, never shipped).

  Design (per issue #42): borderless white card, logo-forward and centred, single subtitle,
  high-contrast navy/grey text (WCAG), generous whitespace, content inside the 1080×600 safe zone.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
        background: #ffffff;
      }
      .og {
        width: 1200px;
        height: 630px;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 60px 90px;
        gap: 30px;
      }
      .og img {
        width: 300px;
        height: auto;
      }
      .og h1 {
        font-size: 66px;
        line-height: 1.06;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: #1f2d3d; /* deep navy — high contrast on white */
      }
      .og .sub {
        font-size: 34px;
        font-weight: 500;
        color: #445566; /* muted slate, WCAG AA on white */
      }
      .og .url {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: 0.3px;
        color: #7a8896;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="og">
      <img src="/ChIC/ChICLogo_NoText_2026-07-02.png" alt="ChIC logo" />
      <h1>Charité Imaging Classification</h1>
      <div class="sub">Risk stratification for polycystic liver disease</div>
      <div class="url">halbritter-lab.github.io/ChIC</div>
    </div>
  </body>
</html>
